<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Bisaya Tongue Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; color: white; }
        .glass-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; backdrop-filter: blur(10px); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 50; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        #historyContent::-webkit-scrollbar { width: 5px; }
        #historyContent::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="historyModal" class="modal">
        <div class="glass-card w-full max-w-2xl max-h-[85vh] overflow-hidden flex flex-col p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                <div>
                    <h2 id="modalTitle" class="text-2xl font-black uppercase italic tracking-tight text-cyan-400">Student Practice Logs</h2>
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Source: user_scores table</p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white transition text-3xl">&times;</button>
            </div>

            <div id="historyContent" class="overflow-y-auto space-y-3 pr-2">
                </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-black italic uppercase tracking-tighter text-white">Admin Dashboard</h1>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-cyan-500 rounded-full animate-ping"></span>
                    <p class="text-slate-400 font-bold text-xs uppercase tracking-widest">Practice Monitoring</p>
                </div>
            </div>
            <a href="/logout" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white border border-red-500/50 px-6 py-2 rounded-xl text-xs font-black transition-all">
                LOGOUT
            </a>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <div class="glass-card p-8 border-l-4 border-l-cyan-500">
                <p class="text-[10px] font-black uppercase text-slate-400 mb-1">Total Students</p>
                <h2 id="total-students" class="text-6xl font-black italic">0</h2>
            </div>
            <div class="glass-card p-8 border-l-4 border-l-purple-500">
                <p class="text-[10px] font-black uppercase text-slate-400 mb-1">Avg Practice Accuracy</p>
                <h2 id="avg-accuracy" class="text-6xl font-black italic text-purple-400">0%</h2>
            </div>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="bg-white/5 p-6 border-b border-white/10">
                <h3 class="text-lg font-black uppercase tracking-tight flex items-center gap-3">
                    <i class="fas fa-user-graduate text-cyan-400"></i> Registered Learners
                </h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-black/20">
                        <tr class="text-slate-400 text-[10px] uppercase font-black tracking-widest">
                            <th class="py-4 px-6">Username</th>
                            <th class="py-4 px-6 text-center">Avg Score</th>
                            <th class="py-4 px-6 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="student-list" class="divide-y divide-white/5">
                        <tr><td colspan="3" class="py-20 text-center text-slate-500 font-bold uppercase italic">Syncing Practice Data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 1. Fetch Practice Summary (from user_scores)
        async function fetchSummary() {
            try {
                const response = await fetch('/get_admin_summary');
                const data = await response.json();

                const list = document.getElementById('student-list');
                const totalDisplay = document.getElementById('total-students');
                const avgDisplay = document.getElementById('avg-accuracy');

                list.innerHTML = "";
                if (!data || data.length === 0) {
                    list.innerHTML = `<tr><td colspan="3" class="py-20 text-center">No student scores recorded.</td></tr>`;
                    return;
                }

                let totalAcc = 0;
                let activeStudents = 0;

                data.forEach(student => {
                    const avg = student.avg_accuracy ? Math.round(student.avg_accuracy) : 0;
                    if(student.avg_accuracy) { totalAcc += avg; activeStudents++; }

                    list.innerHTML += `
                        <tr class="hover:bg-white/5 transition">
                            <td class="py-5 px-6 font-black text-cyan-400 font-mono italic text-lg">@${student.username}</td>
                            <td class="py-5 px-6 text-center">
                                <span class="text-3xl font-black ${avg >= 75 ? 'text-green-400' : 'text-yellow-500'}">${avg}%</span>
                            </td>
                            <td class="py-5 px-6 text-right">
                                <button onclick="viewHistory(${student.id}, '${student.username}')"
                                        class="bg-white text-black hover:bg-cyan-400 px-6 py-2 rounded-lg text-[10px] font-black transition-all uppercase shadow-lg">
                                    Analyze Practice
                                </button>
                            </td>
                        </tr>
                    `;
                });

                totalDisplay.innerText = data.length;
                avgDisplay.innerText = activeStudents > 0 ? Math.round(totalAcc / activeStudents) + "%" : "0%";
            } catch (err) { console.error("Database Sync Error:", err); }
        }

        // 2. Fetch Detailed Practice History (user_scores table)
        async function viewHistory(studentId, username) {
            const modal = document.getElementById('historyModal');
            const content = document.getElementById('historyContent');
            const title = document.getElementById('modalTitle');

            title.innerText = `@${username}`;
            content.innerHTML = `<div class="py-12 text-center animate-pulse text-slate-500 font-black italic uppercase">Querying user_scores...</div>`;
            modal.classList.add('active');

            try {
                const res = await fetch(`/get_student_details/${studentId}`);
                const history = await res.json();

                if (!history || history.length === 0) {
                    content.innerHTML = `
                        <div class="py-20 text-center border-2 border-dashed border-white/5 rounded-3xl">
                            <i class="fas fa-microphone-slash text-slate-700 text-4xl mb-4"></i>
                            <p class="text-slate-500 font-bold uppercase text-xs tracking-widest">No practice sessions found for this user.</p>
                        </div>`;
                    return;
                }

                // Map results from user_scores: word, level, accuracy, timestamp
                content.innerHTML = history.map(item => `
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center group hover:bg-white/10 transition">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="bg-purple-500 text-[8px] text-white font-black px-2 py-0.5 rounded italic">
                                    PRACTICE
                                </span>
                                <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">${item.level}</span>
                            </div>
                            <p class="text-xl font-black text-white group-hover:text-cyan-400 transition">${item.word}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-black ${item.accuracy >= 75 ? 'text-green-400' : 'text-yellow-500'}">${Math.round(item.accuracy)}%</p>
                            <p class="text-[9px] text-slate-500 font-bold uppercase">${new Date(item.timestamp).toLocaleString()}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                content.innerHTML = `<p class="text-red-500 font-black p-10 text-center uppercase">Error connecting to practice records.</p>`;
            }
        }

        function closeModal() { document.getElementById('historyModal').classList.remove('active'); }

        // Initial Sync
        fetchSummary();
        // Refresh data every 30 seconds
        setInterval(fetchSummary, 30000);
    </script>
</body>
</html>
